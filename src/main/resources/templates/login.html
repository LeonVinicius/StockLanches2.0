<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Estoque - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-4xl rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col md:flex-row min-h-[550px]">
        
        <div class="md:w-1/2 bg-blue-600 relative overflow-hidden hidden md:block">
            <img th:src="@{/images/login-memphis.jpg}" alt="Ilustração de login" 
                 class="w-full h-full object-cover opacity-90 transition-transform duration-700 hover:scale-105" />
            <div class="absolute inset-0 bg-blue-900/10 pointer-events-none"></div>
        </div>

        <div class="flex-1 p-8 lg:p-12 flex flex-col justify-center">
            
            <div class="mb-6 text-center md:text-left">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white mb-3 mx-auto md:mx-0 shadow-md shadow-blue-100">
                    <i class="fas fa-burger text-lg"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight">StockLanches</h1>
                <p class="text-sm text-slate-400 font-medium">Sistema de Gestão de Estoque</p>
            </div>
            
            <div th:if="${cadastrado != null and cadastrado.equals('true')}" 
                 class="mb-4 bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-2.5 rounded-xl text-xs font-medium flex items-center gap-2">
                <i class="fas fa-circle-check"></i>
                <span>Usuário cadastrado com sucesso! Faça login para continuar.</span>
            </div>
            
            <div th:if="${erro != null and erro.equals('true')}" 
                 class="mb-4 bg-rose-50 border border-rose-200 text-rose-700 px-4 py-2.5 rounded-xl text-xs font-medium flex items-center gap-2">
                <i class="fas fa-circle-exclamation"></i>
                <span>Email ou senha incorretos. Tente novamente.</span>
            </div>

            <form method="POST" th:action="@{/login}" class="space-y-4">
                
                <div>
                    <label for="email" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Email</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required
                               class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 pl-11 pr-4 text-sm focus:outline-none focus:border-blue-500 focus:bg-white transition-all font-medium">
                    </div>
                </div>

                <div>
                    <label for="senha" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Senha</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                        <input type="password" id="senha" name="senha" placeholder="Sua senha" required
                               class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 pl-11 pr-4 text-sm focus:outline-none focus:border-blue-500 focus:bg-white transition-all font-medium">
                    </div>
                </div>

                <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm py-3 rounded-xl transition-colors shadow-lg shadow-blue-100 hover:shadow-xl mt-2">
                    Entrar no Sistema
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-3 text-xs font-semibold text-slate-400">
                <a th:href="@{/cadastro}" class="hover:text-blue-600 transition-colors">
                    Não tem uma conta? <span class="text-blue-600 font-bold">Cadastre-se</span>
                </a>
                <a href="#" class="hover:text-slate-600 transition-colors">Esqueci minha senha</a>
            </div>

        </div> 
    </div>

</body>
</html>
